name: Build & Test

on:
  push:
    branches: [main]
    paths:
      - '**/*.go'
      - 'go.mod'
      - 'go.sum'
      - 'Dockerfile'
      - 'Dockerfile.prod'
      - 'scripts/**'
      - 'models/**'
      - '.github/workflows/**'
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  packages: write

env:
  # go.mod replaces enclave-os-mini/clients/go with the sibling checkout
  # ../ra-tls-clients/go (same pattern as the CLI repo). Keep the ref in
  # sync with the ARG default in Dockerfile/Dockerfile.prod.
  RA_TLS_CLIENTS_REF: 8a0318d2641ff4e4ce7e8cbaa8391b04fdbb48c9

jobs:
  test:
    name: Test
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6
      - name: Fetch ra-tls-clients (go.mod replace)
        run: |
          git clone https://github.com/Privasys/ra-tls-clients "${GITHUB_WORKSPACE}/../ra-tls-clients"
          git -C "${GITHUB_WORKSPACE}/../ra-tls-clients" checkout "${RA_TLS_CLIENTS_REF}"
      - uses: actions/setup-go@v6
        with:
          go-version: '1.22'
      - run: go test ./... -v -count=1 -race

  build:
    name: Build binary
    runs-on: ubuntu-24.04
    needs: test
    steps:
      - uses: actions/checkout@v6
      - name: Fetch ra-tls-clients (go.mod replace)
        run: |
          git clone https://github.com/Privasys/ra-tls-clients "${GITHUB_WORKSPACE}/../ra-tls-clients"
          git -C "${GITHUB_WORKSPACE}/../ra-tls-clients" checkout "${RA_TLS_CLIENTS_REF}"
      - uses: actions/setup-go@v6
        with:
          go-version: '1.22'
      - run: CGO_ENABLED=0 go build -trimpath -ldflags='-s -w' -o confidential-ai ./cmd/server/
      - uses: actions/upload-artifact@v7
        with:
          name: confidential-ai
          path: confidential-ai

  docker:
    name: Build Docker image
    runs-on: ubuntu-24.04
    needs: test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v6
      - name: Free disk space
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc \
            /usr/local/share/boost /usr/share/swift /opt/hostedtoolcache
          sudo apt-get clean
          docker system prune -af
          df -h /
      - uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - id: repo
        run: echo "name=${GITHUB_REPOSITORY,,}" >> "$GITHUB_OUTPUT"
      - name: Read privasys.json
        id: manifest
        run: |
          if [ -f privasys.json ]; then
            # Compact JSON to a single line for OCI label
            echo "json=$(jq -c . privasys.json)" >> "$GITHUB_OUTPUT"
          fi
      - uses: docker/build-push-action@v7
        with:
          context: .
          file: Dockerfile.prod
          push: true
          tags: ghcr.io/${{ steps.repo.outputs.name }}:latest
          labels: |
            org.privasys.manifest=${{ steps.manifest.outputs.json }}
