name: Build & Test

on:
  push:
    branches: [main]
    paths:
      - '**/*.go'
      - 'go.mod'
      - 'go.sum'
      - 'Dockerfile'
      - 'Dockerfile.prod'
      - 'scripts/**'
      - 'models/**'
      - '.github/workflows/**'
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  test:
    name: Test
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'
      - run: go test ./... -v -count=1 -race

  build:
    name: Build binary
    runs-on: ubuntu-24.04
    needs: test
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'
      - run: CGO_ENABLED=0 go build -trimpath -ldflags='-s -w' -o confidential-ai ./cmd/server/
      - uses: actions/upload-artifact@v4
        with:
          name: confidential-ai
          path: confidential-ai

  docker:
    name: Build Docker image
    runs-on: ubuntu-24.04
    needs: test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v6
      - name: Free disk space
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc \
            /usr/local/share/boost /usr/share/swift /opt/hostedtoolcache
          sudo apt-get clean
          docker system prune -af
          df -h /
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - id: repo
        run: echo "name=${GITHUB_REPOSITORY,,}" >> "$GITHUB_OUTPUT"
      - name: Read privasys.json
        id: manifest
        run: |
          if [ -f privasys.json ]; then
            # Compact JSON to a single line for OCI label
            echo "json=$(jq -c . privasys.json)" >> "$GITHUB_OUTPUT"
          fi
      - uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.prod
          push: true
          tags: ghcr.io/${{ steps.repo.outputs.name }}:latest
          labels: |
            org.privasys.manifest=${{ steps.manifest.outputs.json }}

  models:
    name: Build model overlay images
    runs-on: ubuntu-24.04
    needs: docker
    # Manual-only: per-model overlays are needed for the legacy MODEL_URL boot
    # path used by some e2e tests. Trigger via workflow_dispatch when the base
    # image changes or a model overlay needs republishing.
    if: github.event_name == 'workflow_dispatch'
    strategy:
      matrix:
        model:
          - name: gemma-4-31b-it
            tag: gemma4
    steps:
      - uses: actions/checkout@v6
      - name: Free disk space
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc \
            /usr/local/share/boost /usr/share/swift /opt/hostedtoolcache
          sudo apt-get clean
          docker system prune -af
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - id: repo
        run: echo "name=${GITHUB_REPOSITORY,,}" >> "$GITHUB_OUTPUT"
      - name: Read privasys.json
        id: manifest
        run: |
          if [ -f privasys.json ]; then
            echo "json=$(jq -c . privasys.json)" >> "$GITHUB_OUTPUT"
          fi
      - uses: docker/build-push-action@v6
        with:
          context: models/${{ matrix.model.name }}
          push: true
          tags: ghcr.io/${{ steps.repo.outputs.name }}-${{ matrix.model.tag }}:latest
          labels: |
            org.privasys.manifest=${{ steps.manifest.outputs.json }}
