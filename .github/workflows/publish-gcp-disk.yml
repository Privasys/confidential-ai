name: Publish GCP Disk Cache

# Mirror the latest ghcr.io/privasys/confidential-ai image into a
# read-only GCE persistent disk so the ai-gpu VM can attach it instead
# of pulling 6.3 GB over the public internet on every Spot boot.
#
# See .operations/plans/image-and-model-disks.md for the full design.
#
# Disk naming contract:
#   image-confidential-ai-<channel>-<digest12>
# where <channel> is `prod` or `dev` and <digest12> is the first 12
# hex of the OCI manifest digest.
#
# Triggers:
#   - workflow_run: after Build & Test pushes :latest to ghcr.io
#     (publishes to the `prod` channel automatically).
#   - workflow_dispatch: ad-hoc, with a channel selector (default
#     `dev` so manual runs do not stomp on prod).
#
# WARNING: until the GCP_WIF_* repo vars and GCP_SERVICE_ACCOUNT
# secret are set on this repo, the GCP auth step is wrapped with
# continue-on-error so failed runs are visible but non-blocking.

on:
  workflow_run:
    workflows: ['Build & Test']
    types: [completed]
    branches: [main]
  workflow_dispatch:
    inputs:
      channel:
        description: 'Disk channel'
        type: choice
        options: [prod, dev]
        default: dev
      digest:
        description: 'Image digest to mirror (default: latest tag from ghcr.io)'
        type: string
        required: false

permissions:
  contents: read
  packages: read
  id-token: write   # for GCP Workload Identity Federation

env:
  IMAGE_REPO: ghcr.io/privasys/confidential-ai
  GCP_PROJECT: privasys-development
  GCS_BUCKET: privasys-ai-cache
  IMAGE_NAME: confidential-ai
  TARGET_ZONE: europe-west4-c
  TARGET_VM: ai-gpu

jobs:
  publish-disk:
    name: Mirror to GCE disk
    runs-on: ubuntu-24.04
    # workflow_run case: only proceed if the upstream Build & Test succeeded.
    if: >-
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'workflow_run' && github.event.workflow_run.conclusion == 'success')
    steps:
      - name: Free disk space
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc \
            /usr/local/share/boost /usr/share/swift /opt/hostedtoolcache
          sudo apt-get clean
          docker system prune -af
          df -h /

      - name: Install crane
        run: |
          curl -fsSL "https://github.com/google/go-containerregistry/releases/latest/download/go-containerregistry_Linux_x86_64.tar.gz" \
            | sudo tar -C /usr/local/bin -xz crane
          crane version

      - name: Resolve channel and digest
        id: resolve
        env:
          INPUT_CHANNEL: ${{ inputs.channel }}
          INPUT_DIGEST:  ${{ inputs.digest }}
        run: |
          set -euo pipefail
          CHANNEL="${INPUT_CHANNEL:-prod}"
          if [ "${{ github.event_name }}" = "workflow_run" ]; then
            CHANNEL=prod
          fi

          if [ -n "${INPUT_DIGEST}" ]; then
            DIGEST="${INPUT_DIGEST#sha256:}"
            DIGEST="sha256:${DIGEST}"
          else
            # Resolve :latest. crane uses anonymous auth for public repos.
            DIGEST=$(crane digest "${IMAGE_REPO}:latest")
          fi
          SHORT="${DIGEST#sha256:}"
          SHORT="${SHORT:0:12}"
          DISK="image-${IMAGE_NAME}-${CHANNEL}-${SHORT}"

          {
            echo "channel=${CHANNEL}"
            echo "digest=${DIGEST}"
            echo "short=${SHORT}"
            echo "disk=${DISK}"
          } | tee -a "$GITHUB_OUTPUT"

      - name: Pull OCI layout
        run: |
          set -euo pipefail
          mkdir -p /tmp/oci
          crane pull --format=oci \
            "${IMAGE_REPO}@${{ steps.resolve.outputs.digest }}" /tmp/oci
          ls -la /tmp/oci
          du -sh /tmp/oci

      - name: Build ext4 disk image
        id: build
        run: |
          set -euo pipefail
          # Estimate size: OCI layout * 1.5 + 256 MiB headroom, rounded up to 1 GiB.
          BYTES=$(du -sb /tmp/oci | awk '{print $1}')
          TARGET_MB=$(( (BYTES * 3 / 2 + 256*1024*1024) / (1024*1024) ))
          # Round up to nearest 1024 MiB
          TARGET_MB=$(( ((TARGET_MB + 1023) / 1024) * 1024 ))
          echo "size_mb=${TARGET_MB}" | tee -a "$GITHUB_OUTPUT"

          truncate -s "${TARGET_MB}M" /tmp/disk.raw
          mkfs.ext4 -q -L "${IMAGE_NAME}" -m 0 -O ^has_journal /tmp/disk.raw
          mkdir -p /tmp/mnt
          sudo mount -o loop /tmp/disk.raw /tmp/mnt
          sudo cp -a /tmp/oci/. /tmp/mnt/
          sudo umount /tmp/mnt
          ls -lh /tmp/disk.raw

      - name: Package for GCS
        run: |
          set -euo pipefail
          # GCE compute images created from a tarball must be named
          # disk.raw inside a .tar.gz at the GCS root.
          tar -C /tmp -czSf /tmp/${{ steps.resolve.outputs.disk }}.tar.gz disk.raw
          ls -lh /tmp/${{ steps.resolve.outputs.disk }}.tar.gz

      - name: Authenticate to GCP
        id: gcp_auth
        uses: google-github-actions/auth@v3
        continue-on-error: true
        with:
          workload_identity_provider: projects/${{ vars.GCP_PROJECT_NUMBER }}/locations/global/workloadIdentityPools/${{ vars.GCP_WIF_POOL }}/providers/${{ vars.GCP_WIF_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}
          project_id: ${{ env.GCP_PROJECT }}

      - name: Set up gcloud
        if: steps.gcp_auth.outcome == 'success'
        uses: google-github-actions/setup-gcloud@v3

      - name: Upload to GCS
        if: steps.gcp_auth.outcome == 'success'
        run: |
          gcloud storage cp \
            "/tmp/${{ steps.resolve.outputs.disk }}.tar.gz" \
            "gs://${{ env.GCS_BUCKET }}/"

      - name: Create GCE compute image
        if: steps.gcp_auth.outcome == 'success'
        run: |
          set -euo pipefail
          DISK="${{ steps.resolve.outputs.disk }}"
          FAMILY="privasys-${IMAGE_NAME}-${{ steps.resolve.outputs.channel }}"
          gcloud compute images create "${DISK}" \
            --project="${GCP_PROJECT}" \
            --source-uri="gs://${GCS_BUCKET}/${DISK}.tar.gz" \
            --family="${FAMILY}" \
            --description="OCI layout of ${IMAGE_REPO}@${{ steps.resolve.outputs.digest }}" \
            --labels=privasys-image-name=${IMAGE_NAME},privasys-channel=${{ steps.resolve.outputs.channel }},privasys-digest=${{ steps.resolve.outputs.short }}

      - name: Create persistent disk in target zone
        if: steps.gcp_auth.outcome == 'success'
        run: |
          set -euo pipefail
          DISK="${{ steps.resolve.outputs.disk }}"
          gcloud compute disks create "${DISK}" \
            --project="${GCP_PROJECT}" \
            --zone="${TARGET_ZONE}" \
            --image="${DISK}" \
            --type=pd-balanced \
            --labels=privasys-image-name=${IMAGE_NAME},privasys-channel=${{ steps.resolve.outputs.channel }},privasys-digest=${{ steps.resolve.outputs.short }}

      - name: Attach disk to ${{ env.TARGET_VM }} (read-only)
        if: steps.gcp_auth.outcome == 'success'
        run: |
          set -euo pipefail
          DISK="${{ steps.resolve.outputs.disk }}"
          # If the VM is up, attach. If not, skip (the disk attaches on next boot
          # only if it is referenced in the instance template; for an existing
          # standalone Spot VM, we attach now and detach the old one).
          if gcloud compute instances describe "${TARGET_VM}" \
               --zone="${TARGET_ZONE}" --project="${GCP_PROJECT}" \
               --format='value(name)' >/dev/null 2>&1; then
            gcloud compute instances attach-disk "${TARGET_VM}" \
              --zone="${TARGET_ZONE}" --project="${GCP_PROJECT}" \
              --disk="${DISK}" --device-name="${DISK}" --mode=ro \
              || echo "WARNING: attach failed (already attached?)"
          else
            echo "WARNING: ${TARGET_VM} not found in ${TARGET_ZONE}, skipping attach"
          fi

      - name: Garbage-collect older disks in family
        if: steps.gcp_auth.outcome == 'success'
        run: |
          set -euo pipefail
          KEEP="${{ steps.resolve.outputs.disk }}"
          CHANNEL="${{ steps.resolve.outputs.channel }}"
          PREFIX="image-${IMAGE_NAME}-${CHANNEL}-"

          echo "Garbage collection: keeping ${KEEP}, removing other ${PREFIX}* disks/images"

          # Detach + delete older zonal disks in the same family on the target VM.
          mapfile -t OLD_DISKS < <(gcloud compute disks list \
            --project="${GCP_PROJECT}" \
            --filter="name~^${PREFIX} AND zone:${TARGET_ZONE} AND name!=${KEEP}" \
            --format='value(name)')
          for d in "${OLD_DISKS[@]:-}"; do
            [ -z "$d" ] && continue
            echo "Detaching/deleting old disk: $d"
            gcloud compute instances detach-disk "${TARGET_VM}" \
              --zone="${TARGET_ZONE}" --project="${GCP_PROJECT}" \
              --device-name="$d" 2>/dev/null || true
            gcloud compute disks delete "$d" \
              --zone="${TARGET_ZONE}" --project="${GCP_PROJECT}" --quiet || true
          done

          # Delete older compute images in the same family.
          mapfile -t OLD_IMAGES < <(gcloud compute images list \
            --project="${GCP_PROJECT}" \
            --filter="name~^${PREFIX} AND name!=${KEEP}" \
            --format='value(name)')
          for img in "${OLD_IMAGES[@]:-}"; do
            [ -z "$img" ] && continue
            echo "Deleting old image: $img"
            gcloud compute images delete "$img" \
              --project="${GCP_PROJECT}" --quiet || true
          done

      - name: Warn if GCP steps were skipped
        if: steps.gcp_auth.outcome != 'success'
        run: |
          echo "::warning::GCP authentication failed or unset; disk was built locally but not published."
          echo "Set repo vars GCP_PROJECT_NUMBER, GCP_WIF_POOL, GCP_WIF_PROVIDER and secret GCP_SERVICE_ACCOUNT to enable publishing."
          echo "Disk artefact: $(ls -lh /tmp/${{ steps.resolve.outputs.disk }}.tar.gz)"
