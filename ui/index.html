<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Confidential AI Chat</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
    --bg: #ffffff; --fg: #111; --muted: #666; --border: #e5e5e5;
    --user-bg: #f0f0f0; --assistant-bg: #f8f9fa; --accent: #2563eb;
    --input-bg: #fff; --badge-bg: #f0fdf4; --badge-fg: #166534;
    --danger: #dc2626;
}
@media (prefers-color-scheme: dark) {
    :root {
        --bg: #0a0a0a; --fg: #e5e5e5; --muted: #999; --border: #2a2a2a;
        --user-bg: #1a1a2e; --assistant-bg: #111; --accent: #3b82f6;
        --input-bg: #111; --badge-bg: #052e16; --badge-fg: #86efac;
        --danger: #ef4444;
    }
}
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: var(--bg); color: var(--fg); height: 100vh; display: flex; flex-direction: column; }
#chat-messages { flex: 1; overflow-y: auto; padding: 1rem; display: flex; flex-direction: column; gap: 1rem; }
.message { max-width: 80%; padding: 0.75rem 1rem; border-radius: 0.75rem; line-height: 1.5; font-size: 0.9375rem; white-space: pre-wrap; word-break: break-word; }
.message.user { align-self: flex-end; background: var(--user-bg); border: 1px solid var(--border); }
.message.assistant { align-self: flex-start; background: var(--assistant-bg); border: 1px solid var(--border); }
.message.error { align-self: center; color: var(--danger); background: none; border: 1px solid var(--danger); font-size: 0.85rem; }
.message .meta { margin-top: 0.5rem; padding-top: 0.5rem; border-top: 1px solid var(--border); font-size: 0.75rem; color: var(--muted); display: flex; flex-wrap: wrap; gap: 0.5rem; }
.message .meta span { background: var(--badge-bg); color: var(--badge-fg); padding: 0.125rem 0.5rem; border-radius: 9999px; }
#input-area { border-top: 1px solid var(--border); padding: 0.75rem 1rem; display: flex; gap: 0.5rem; align-items: flex-end; }
#input-area textarea { flex: 1; resize: none; border: 1px solid var(--border); border-radius: 0.5rem; padding: 0.625rem 0.75rem; font-size: 0.9375rem; font-family: inherit; background: var(--input-bg); color: var(--fg); line-height: 1.4; max-height: 8rem; field-sizing: content; }
#input-area textarea:focus { outline: 2px solid var(--accent); outline-offset: -1px; }
#input-area textarea:disabled { opacity: 0.5; }
#input-area button { background: var(--accent); color: #fff; border: none; border-radius: 0.5rem; padding: 0.625rem 1rem; font-size: 0.9375rem; cursor: pointer; white-space: nowrap; }
#input-area button:hover { opacity: 0.9; }
#input-area button:disabled { opacity: 0.4; cursor: not-allowed; }
#header { display: flex; align-items: center; justify-content: space-between; padding: 0.5rem 1rem; border-bottom: 1px solid var(--border); }
#header h1 { font-size: 1rem; font-weight: 600; }
#header button { background: none; border: 1px solid var(--border); border-radius: 0.375rem; padding: 0.25rem 0.75rem; font-size: 0.8125rem; cursor: pointer; color: var(--muted); }
#header button:hover { border-color: var(--muted); }
.typing { align-self: flex-start; color: var(--muted); font-size: 0.85rem; padding: 0.5rem 1rem; }
.typing::after { content: ''; animation: dots 1.2s infinite; }
@keyframes dots { 0% { content: '.'; } 33% { content: '..'; } 66% { content: '...'; } }
#empty-state { flex: 1; display: flex; align-items: center; justify-content: center; color: var(--muted); font-size: 0.9375rem; text-align: center; padding: 2rem; }
</style>
</head>
<body>

<div id="header">
    <h1 id="app-title">Confidential AI</h1>
    <button onclick="resetChat()">New chat</button>
</div>

<div id="chat-messages">
    <div id="empty-state">Send a message to start a confidential conversation.</div>
</div>

<div id="input-area">
    <textarea id="prompt" rows="1" placeholder="Type a message..." autofocus></textarea>
    <button id="send-btn" onclick="sendMessage()">Send</button>
</div>

<script>
// Configuration received from the developer portal via postMessage.
let config = { apiUrl: '', appId: '', appName: '', hostname: '', token: '' };
let messages = []; // {role, content, reproducibility?}
let sending = false;

// Listen for configuration from the parent developer portal.
window.addEventListener('message', (e) => {
    if (e.data?.type === 'privasys-init') {
        config.apiUrl = e.data.apiUrl || '';
        config.appId = e.data.appId || '';
        config.appName = e.data.appName || '';
        config.hostname = e.data.hostname || '';
        config.token = e.data.token || '';
        if (config.appName) {
            document.getElementById('app-title').textContent = config.appName;
            document.title = config.appName + ' - Chat';
        }
    }
});

// Also allow configuration via URL query params (fallback for direct access).
(function initFromParams() {
    const p = new URLSearchParams(location.search);
    if (p.get('apiUrl')) config.apiUrl = p.get('apiUrl');
    if (p.get('appId')) config.appId = p.get('appId');
    if (p.get('appName')) config.appName = p.get('appName');
    if (p.get('hostname')) config.hostname = p.get('hostname');
    if (p.get('token')) config.token = p.get('token');
    if (config.appName) {
        document.getElementById('app-title').textContent = config.appName;
    }
})();

const textarea = document.getElementById('prompt');
const sendBtn = document.getElementById('send-btn');
const chatMessages = document.getElementById('chat-messages');

textarea.addEventListener('keydown', (e) => {
    if (e.key === 'Enter' && !e.shiftKey) {
        e.preventDefault();
        sendMessage();
    }
});

function scrollToBottom() {
    chatMessages.scrollTop = chatMessages.scrollHeight;
}

function renderMessages() {
    const empty = document.getElementById('empty-state');
    if (empty && messages.length > 0) empty.remove();

    // Only render the last message (append-only for performance).
    const msg = messages[messages.length - 1];
    const div = document.createElement('div');
    div.className = 'message ' + msg.role;

    if (msg.role === 'error') {
        div.textContent = msg.content;
    } else {
        div.textContent = msg.content;
        if (msg.reproducibility) {
            const meta = document.createElement('div');
            meta.className = 'meta';
            const r = msg.reproducibility;
            if (r.model) meta.innerHTML += `<span>model: ${esc(r.model)}</span>`;
            if (r.seed !== undefined) meta.innerHTML += `<span>seed: ${esc(String(r.seed))}</span>`;
            if (r.tee_type) meta.innerHTML += `<span>TEE: ${esc(r.tee_type)}</span>`;
            if (r.gpu) meta.innerHTML += `<span>GPU: ${esc(r.gpu)}</span>`;
            if (r.vllm_version) meta.innerHTML += `<span>vLLM: ${esc(r.vllm_version)}</span>`;
            div.appendChild(meta);
        }
    }
    chatMessages.appendChild(div);
    scrollToBottom();
}

function esc(s) { const d = document.createElement('div'); d.textContent = s; return d.innerHTML; }

function setLoading(on) {
    sending = on;
    sendBtn.disabled = on;
    textarea.disabled = on;
    const existing = document.querySelector('.typing');
    if (on && !existing) {
        const t = document.createElement('div');
        t.className = 'typing';
        t.textContent = 'Thinking';
        chatMessages.appendChild(t);
        scrollToBottom();
    } else if (!on && existing) {
        existing.remove();
    }
}

async function sendMessage() {
    const text = textarea.value.trim();
    if (!text || sending) return;

    if (!config.appId) {
        messages.push({ role: 'error', content: 'Not connected. Open this from the developer portal.' });
        renderMessages();
        return;
    }

    // Add user message
    messages.push({ role: 'user', content: text });
    renderMessages();
    textarea.value = '';

    // Build the OpenAI-compatible message list.
    const apiMessages = messages
        .filter(m => m.role === 'user' || m.role === 'assistant')
        .map(m => ({ role: m.role, content: m.content }));

    setLoading(true);

    try {
        // This demo runs in a sandboxed (null-origin) iframe, so it cannot call
        // the enclave directly. Ask the parent developer portal — authenticated
        // and same-origin to the API — to relay the chat through the management
        // RPC proxy, and render the (non-streaming) reply.
        const content = await requestChatViaParent(apiMessages);
        const typing = document.querySelector('.typing');
        if (typing) typing.remove();
        messages.push({ role: 'assistant', content });
        renderMessages();
    } catch (err) {
        const typing = document.querySelector('.typing');
        if (typing) typing.remove();
        messages.push({ role: 'error', content: err.message || 'Request failed' });
        renderMessages();
    } finally {
        setLoading(false);
        textarea.focus();
    }
}

// Relay one chat turn through the parent portal via postMessage. Resolves with
// the assistant text or rejects on error/timeout.
function requestChatViaParent(apiMessages) {
    return new Promise((resolve, reject) => {
        const id = Math.random().toString(36).slice(2);
        const timer = setTimeout(() => {
            window.removeEventListener('message', onResp);
            reject(new Error('Timed out waiting for the portal.'));
        }, 180000);
        function onResp(e) {
            const d = e.data;
            if (!d || d.type !== 'privasys-chat-response' || d.id !== id) return;
            clearTimeout(timer);
            window.removeEventListener('message', onResp);
            if (d.error) reject(new Error(d.error));
            else resolve(d.content || '');
        }
        window.addEventListener('message', onResp);
        parent.postMessage({ type: 'privasys-chat', id, messages: apiMessages }, '*');
    });
}

function resetChat() {
    messages = [];
    chatMessages.innerHTML = '<div id="empty-state">Send a message to start a confidential conversation.</div>';
    textarea.value = '';
    textarea.focus();
}
</script>
</body>
</html>
